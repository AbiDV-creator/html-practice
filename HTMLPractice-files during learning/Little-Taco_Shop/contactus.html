<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTS Hours</title>
    <link rel="stylesheet" href="contactus.css" type="text/css">
    <link rel="icon" href="randomlogo.avif" type="img/x-icon">
</head>
<body>
    <header>
        <h1> The Little Taco Shop Hours</h1>
        <nav aria-label="primary-navigation">
            <ul>
                <li>
                    <a href="#home">Home</a>
                </li>
                <li>
                    <a href="#aboutLTS">About LTS</a>
                </li>
                <li>
                    <a href="#ourmenu">Our Menu</a>
                </li>
                <li>
                    <a href="storehours.html">Store Hours</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <article id="html">
            <section id="home">
                <figure>
                    <img src="img/pexels-dominika-polakova-719696518-18319038.jpg" alt="Taco image" title="The Taco Shop" width="300px" height="250px" loading="lazy">
                <figcaption>Little Taco Shop Tacos</figcaption>
            </figure>
                <hr>
            </section>
            <section id="contactme">
                <h2>Our Contact Form</h2>
                <form action="https://httpbin.org/get" method="get">
                    <fieldset>
                        <legend>Send Us A Message</legend>

                        <p>
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" placeholder="Enter name" autocomplete="on" required>
                        </p>
                        <p>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" placeholder="Enter email" autocomplete="on" required>
                        </p>

                        <label for="message">Your Message:</label>
                        <p>
                            <textarea name="message" id="message" cols="30" rows="10" placeholder="Type your thoughts"></textarea>
                        </p>

                        <button type="submit"  formaction="https://httpbin.org/get" formmethod="post">Post</button>

                    </fieldset>
                </form>
            </section>
            <a href="#">Back To Top</a>
        </article>
    </main>
    <footer>
        Copyright &copy;Abirami S -<small>All rights Reserved.</small>
    </footer>
</body>
</html>
